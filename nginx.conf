events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── HTTP (internal-only) ────────────────────────────────────────────────
    # Default server for requests that do NOT match the public domain.
    # This is used for container-to-container requests like http://frontend/__infra.json.
    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;

        location = /__infra.json {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
            access_log off;
            add_header Content-Type application/json;
        }

        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 404;
        }
    }

    # ── HTTP → HTTPS redirect (public domain only) ──────────────────────────
    server {
        listen 80;
        server_name aloeve.club www.aloeve.club;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS (main) ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name aloeve.club www.aloeve.club;

        # Cloudflare Origin Certificate — mounted from host at /etc/ssl/aloeve/
        # See docs/HTTPS_SETUP.md for instructions on generating this certificate.
        ssl_certificate     /etc/ssl/aloeve/origin.pem;
        ssl_certificate_key /etc/ssl/aloeve/origin.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # Telegram Login Widget and Mini App require 'unsafe-eval' (telegram-widget.js uses eval
        # internally) and 'unsafe-inline' for bootstrap scripts. Everything else is scoped to
        # first-party + telegram.org origins so the policy actually protects against XSS.
        # frame-src covers the oauth popup the widget renders during sign-in.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org https://*.telegram.org https://oauth.telegram.org 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; font-src 'self' data:; connect-src 'self' https://telegram.org https://*.telegram.org wss: https:; frame-src https://telegram.org https://oauth.telegram.org https://*.telegram.org; frame-ancestors 'self' https://telegram.org https://web.telegram.org https://*.telegram.org; base-uri 'self'; form-action 'self';" always;

        # Allow up to 20 MB uploads (profile images)
        client_max_body_size 20m;

        # Proxy API requests to the backend container
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Container-local infrastructure JSON, intended for backend-only access.
        # Allow Docker bridge/private networks; deny public.
        location = /__infra.json {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
            access_log off;
            add_header Content-Type application/json;
        }

        # WebSocket / SignalR
        location /hubs/ {
            proxy_pass         http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /swagger {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin shell (second Vite entry: admin.html) — /admin, /admin/users, …
        location ~ ^/admin {
            try_files $uri $uri/ /admin.html;
        }

        # Handle React Router (SPA)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}