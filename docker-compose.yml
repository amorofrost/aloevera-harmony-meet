# Docker Compose for AloeVera Harmony Meet
# Full stack: Frontend + Backend

version: '3.8'

services:
  # Backend API (.NET)
  backend:
    build:
      context: ../lovecraft/Lovecraft
      dockerfile: Dockerfile
    container_name: aloevera-backend
    # No external port exposed — backend is only reachable through nginx internally.
    # For ad-hoc debugging, temporarily add "5000:8080" and restrict port 5000
    # to your IP in the Azure NSG, then remove it when done.
    env_file:
      - ../lovecraft/Lovecraft/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - aloevera-network
    # Note: infrastructure metrics are collected inside each container without Docker APIs.

  # Telegram bot (long polling — no inbound port)
  telegram-bot:
    build:
      context: ../lovecraft/Lovecraft
      dockerfile: Dockerfile.telegram-bot
    container_name: aloevera-telegram-bot
    env_file:
      - ../lovecraft/Lovecraft/.env
    networks:
      - aloevera-network
    restart: unless-stopped

  # Frontend (React + nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_MODE: api
    container_name: aloevera-frontend
    ports:
      - "80:80"     # HTTP — nginx redirects to HTTPS
      - "443:443"   # HTTPS — Cloudflare Origin Certificate
    volumes:
      # SSL cert and key mounted from host — never baked into the image.
      # Place files at /etc/ssl/aloeve/origin.pem and /etc/ssl/aloeve/origin.key
      # on the VM before starting. See docs/HTTPS_SETUP.md.
      - /etc/ssl/aloeve:/etc/ssl/aloeve:ro
    depends_on:
      - backend
    env_file:
      - .env
    healthcheck:
      # Must match a URL that returns 200 on port 80 (default_server serves /health; / is 404).
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - aloevera-network

networks:
  aloevera-network:
    driver: bridge
